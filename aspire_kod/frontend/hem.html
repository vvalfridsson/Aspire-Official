<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Hem</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
  .laddar { display: flex; align-items: center; justify-content: center; padding: 40px; color: #ADADAD; font-size: 14px; }
  .valj-atlet-skarm { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 16px; }
  .valj-atlet-titel { font-size: 18px; font-weight: 700; color: #0A0A0A; }
  .valj-atlet-beskrivning { font-size: 14px; color: #ADADAD; line-height: 1.5; }
  .valj-atlet-knapp { background: #0A0A0A; color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none; display: inline-block; }
  .bocka-knapp { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #E5E5E5; background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
  .bocka-knapp svg { width: 14px; height: 14px; fill: none; stroke: transparent; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .bocka-knapp.klar { background: #0A0A0A; border-color: #0A0A0A; }
  .bocka-knapp.klar svg { stroke: white; }
  .aktivitet-rad.avbockad { opacity: 0.45; }
  .progress-omslag { padding: 12px 20px 4px 20px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-text { font-size: 12px; color: #ADADAD; }
  .progress-procent { font-size: 12px; font-weight: 700; color: #0A0A0A; }
  .progress-bar { height: 4px; background: #F0F0F0; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #0A0A0A; border-radius: 2px; transition: width 0.5s ease; }
  .byt-atlet-rad { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid #F0F0F0; text-decoration: none; cursor: pointer; }
  .byt-atlet-rad span { font-size: 14px; color: #ADADAD; }
  .byt-atlet-rad svg { width: 14px; height: 14px; fill: none; stroke: #ADADAD; stroke-width: 2; stroke-linecap: round; }
</style>
</head>
<body>

  <div class="telefon">

    <!-- ─── STATUSRAD ─── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner"></div>
    </div>

    <!-- ─── RULLNINGSBART INNEHÅLL ─── -->
    <div class="innehall" id="huvudinnehall">
    <div class="laddar">Laddar...</div>
    </div>

    <!-- ─── NAVBAR — HEM ÄR AKTIV ─── -->
    <nav class="navbar">
      <a href="hem.html" class="nav-knapp aktiv">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge" id="notis-badge"></div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
<script>
  const API = "http://127.0.0.1:8002";

  function visaValjAtlet() {
    document.getElementById("huvudinnehall").innerHTML = `
      <div class="valj-atlet-skarm">
        <div class="valj-atlet-titel">Välj en atlet</div>
        <div class="valj-atlet-beskrivning">Gå till sök-sidan och välj en atlet vars schema du vill följa idag.</div>
        <a href="sok.html" class="valj-atlet-knapp">Hitta en atlet</a>
      </div>
    `;
  }

  function renderaSchema(atlet, aktiviteter) {
    const initialer = (atlet.namn || "??").trim().split(" ").map(d => d[0]).join("").substring(0, 2).toUpperCase();
    const totalt = aktiviteter.length;
    const avbockade = aktiviteter.filter(a => a.avbockad).length;
    const procent = totalt > 0 ? Math.round((avbockade / totalt) * 100) : 0;

    const aktivitetHtml = aktiviteter.map((akt, i) => {
      const tid = akt.tid_start && akt.tid_slut ? `${akt.tid_start}–${akt.tid_slut}` : akt.tid_start || "";
      return `
        <div class="aktivitet-rad ${akt.avbockad ? "avbockad" : ""}" id="rad-${akt.id}">
          <div class="aktivitet-prick ${i < Math.ceil(totalt / 2) ? "rod" : "gra"}"></div>
          <div class="aktivitet-ikon">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="aktivitet-kropp">
            ${tid ? `<div class="aktivitet-tid">${tid}</div>` : ""}
            <div class="aktivitet-namn">${akt.namn}</div>
            ${akt.beskrivning ? `<div class="aktivitet-beskrivning">${akt.beskrivning}</div>` : ""}
          </div>
          <button class="bocka-knapp ${akt.avbockad ? "klar" : ""}" onclick="bockaAv(${akt.id}, this)">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      `;
    }).join("");

    document.getElementById("huvudinnehall").innerHTML = `
      <div class="schema-header">
        <div class="schema-fortitel">Idag tränar du som</div>
        <div class="schema-namnrad">
          <div class="schema-namn-stor">${atlet.namn || "Atleten"}</div>
          <div class="schema-avatar">${initialer}<div class="schema-badge">${atlet.id}</div></div>
        </div>
        <div class="etikett-pill">Aktiviteter</div>
      </div>
      <div class="progress-omslag">
        <div class="progress-info">
          <span class="progress-text">${avbockade} av ${totalt} klara</span>
          <span class="progress-procent">${procent}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${procent}%"></div></div>
      </div>
      ${aktivitetHtml}
      <a href="sok.html" class="byt-atlet-rad">
        <span>Byt atlet</span>
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <div class="botten-mellanrum"></div>
    `;
  }

  async function bockaAv(aktivitetId, knapp) {
    const user = JSON.parse(localStorage.getItem("aspire_inloggad"));
    if (!user) return;
    const radEl = document.getElementById(`rad-${aktivitetId}`);
    const arKlar = knapp.classList.contains("klar");
    knapp.classList.toggle("klar", !arKlar);
    radEl.classList.toggle("avbockad", !arKlar);
    try {
      await fetch(`${API}/anvandare/${user.id}/schema/${aktivitetId}/bocka-av`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ avbockad: !arKlar })
      });
      await laddaHem();
    } catch (e) {
      knapp.classList.toggle("klar", arKlar);
      radEl.classList.toggle("avbockad", arKlar);
    }
  }

  async function laddaHem() {
    const user = JSON.parse(localStorage.getItem("aspire_inloggad"));
    if (!user) { window.location.href = "index.html"; return; }
    try {
      const [atletSvar, schemaSvar] = await Promise.all([
        fetch(`${API}/anvandare/${user.id}/vald-atlet`),
        fetch(`${API}/anvandare/${user.id}/schema/idag`)
      ]);
      if (atletSvar.status === 404) { visaValjAtlet(); return; }
      const atlet = await atletSvar.json();
      const schema = await schemaSvar.json();
      renderaSchema(atlet, schema);
    } catch (e) {
      visaValjAtlet();
    }
  }

  document.addEventListener("DOMContentLoaded", laddaHem);
</script>
</body>
</html>
