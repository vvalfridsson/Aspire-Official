<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Michael Jordan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <!-- ─── STATUSRAD ─── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
    </div>

    <!-- ─── RULLNINGSBART INNEHÅLL ─── -->
    <div class="innehall">

      <!-- Tillbaka-knapp → gå tillbaka till söksidan -->
      <a href="sok.html" class="tillbaka-knapp" style="display:flex;">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>

      <!-- Atletens topp: avatar, namn, sport -->
      <div class="atlet-topp">

      <div class="atlet-stor-avatar" id="profil-avatar"></div>
      <div class="atlet-stort-namn" id="profil-namn"></div>
      <div class="atlet-stor-sport" id="profil-sport"></div>
        <!-- Biometri: kalorier + träning per dag -->
<div class="bio-rad">
  <div class="bio-post rod">
    <svg viewBox="0 0 24 24"><path d="M12 2c-4 6-6 10-6 13a6 6 0 0 0 12 0c0-3-2-7-6-13z"/></svg>
    <span id="profil-kalorier"></span>
  </div>
  <div class="bio-post">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="profil-traning"></span>
  </div>
</div>

        <!-- Karriärstatistik -->
        <div class="atlet-statistik">
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra"></div>
            <div class="atlet-stat-etikett"></div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra">5</div>
            <div class="atlet-stat-etikett">MVPs</div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra">14x</div>
            <div class="atlet-stat-etikett">All-Star</div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra">32,292</div>
            <div class="atlet-stat-etikett">Career Pts</div>
          </div>
        </div>

      </div>

      <!-- Inspirationscitat -->
      <div class="citat-ruta" id="profil-citat">

      </div>

      <!-- Flikar: Schema / Kost / Träning -->
      <div class="flik-rad">
        <button class="flik aktiv" onclick="byttFlik(this, 'schema')">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Schema
        </button>
        <button class="flik" onclick="byttFlik(this, 'kost')">
          <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
          Kost
        </button>
        <button class="flik" onclick="byttFlik(this, 'traning')">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Träning
        </button>
      </div>

      <!-- Schema-lista -->
      <div class="schema-lista" id="profil-innehall">
        <div class="schema-post">
          <div class="schema-prick rod"></div>
          <div>
            <div class="schema-tid">06.00</div>
            <div class="schema-namn">Vakna!</div>
          </div>
        </div>

        <div class="schema-post">
          <div class="schema-prick rod"></div>
          <div>
            <div class="schema-tid">06.30–08.00</div>
            <div class="schema-namn">Gym</div>
          </div>
        </div>

        <div class="schema-post">
          <div class="schema-prick gra"></div>
          <div>
            <div class="schema-tid">08.30–09.00</div>
            <div class="schema-namn">Power Nap</div>
            <div class="schema-beskrivning">| Samla energi för dagen!</div>
          </div>
        </div>

        <div class="schema-post">
          <div class="schema-prick gra"></div>
          <div>
            <div class="schema-tid">09.00–09.45</div>
            <div class="schema-namn">Välförtjänt frukost</div>
          </div>
        </div>

        <div class="schema-post">
          <div class="schema-prick rod"></div>
          <div>
            <div class="schema-tid">10.00–11.30</div>
            <div class="schema-namn">Lagträning</div>
          </div>
        </div>

        <div class="schema-post">
          <div class="schema-prick gra"></div>
          <div>
            <div class="schema-tid">12.00–12.45</div>
            <div class="schema-namn">Lunch med laget</div>
          </div>
        </div>

      </div>

    </div>

    <!-- ─── NAVBAR — SÖK ÄR AKTIV (kom hit från söksidan) ─── -->
    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp aktiv">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge" id="notis-badge"></div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="../javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
