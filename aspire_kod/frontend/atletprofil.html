<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Atletprofil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <div class="statusrad">
      <span class="statusrad-tid"></span>
    </div>

    <div class="innehall">

      <a href="sok.html" class="tillbaka-knapp" style="display:flex;">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>

      <div class="atlet-topp">

        <div class="atlet-stor-avatar" id="profil-avatar"></div>
        <div class="atlet-stort-namn" id="profil-namn"></div>
        <div class="atlet-stor-sport" id="profil-sport"></div>
        
        <div class="bio-rad">
          <div class="bio-post rod">
            <svg viewBox="0 0 24 24"><path d="M12 2c-4 6-6 10-6 13a6 6 0 0 0 12 0c0-3-2-7-6-13z"/></svg>
            <span id="profil-kalorier"></span>
          </div>
          <div class="bio-post">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="profil-traning"></span>
          </div>
        </div>

        <div class="atlet-statistik">
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra"></div>
            <div class="atlet-stat-etikett">kcal/dag</div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra"></div>
            <div class="atlet-stat-etikett">träning</div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra"></div>
            <div class="atlet-stat-etikett">sport</div>
          </div>
          <div class="atlet-stat-post">
            <div class="atlet-stat-siffra"></div>
            <div class="atlet-stat-etikett">atlet-id</div>
          </div>
        </div>

      </div>

      <div class="citat-ruta" id="profil-citat"></div>

      <script>
        (function() {
          try {
            const id = new URLSearchParams(window.location.search).get("id") || "1";
            const sparade = JSON.parse(localStorage.getItem('aspire_alla_atleter')) || [];
            const atlet = sparade.find(a => a.id == id);
            if (atlet) {
              const delar = atlet.namn ? atlet.namn.trim().split(" ") : [];
              const init = delar.length === 1 ? delar[0].substring(0, 2) : (delar[0][0] + delar[delar.length - 1][0]);
              
              document.getElementById("profil-avatar").textContent = atlet.initialer || init.toUpperCase();
              document.getElementById("profil-namn").textContent = atlet.namn || "";
              document.getElementById("profil-sport").textContent = atlet.sport || "";
              document.getElementById("profil-kalorier").textContent = atlet.kcal_per_dag ? atlet.kcal_per_dag + " kcal" : "Saknas";
              document.getElementById("profil-traning").textContent = atlet.traningstid_timmar ? atlet.traningstid_timmar + "h/dag" : "Saknas";
              document.getElementById("profil-citat").textContent = atlet.citat || "Ingen motivationstext finns ännu.";
              document.title = "Aspire — " + (atlet.namn || "Profil");

              const joints = document.querySelectorAll(".atlet-stat-siffra");
              const statVarden = [
                atlet.kcal_per_dag || "-",
                atlet.traningstid_timmar ? atlet.traningstid_timmar + "h" : "-",
                atlet.sport || "-",
                atlet.id || "-"
              ];
              joints.forEach((el, i) => { if(el) el.textContent = statVarden[i]; });
            }
          } catch(e) { console.error(e); }
        })();
      </script>

      <div class="flik-rad">
        <button class="flik aktiv" onclick="byttFlik(this, 'schema')">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Schema
        </button>
        <button class="flik" onclick="byttFlik(this, 'kost')">
          <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
          Kost
        </button>
        <button class="flik" onclick="byttFlik(this, 'traning')">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Träning
        </button>
      </div>

      <div class="schema-lista" id="profil-innehall"></div>

    </div>

    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp aktiv">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge" id="notis-badge"></div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
