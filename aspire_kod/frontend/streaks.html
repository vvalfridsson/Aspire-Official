<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Streaks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <!-- ─── STATUSRAD ─── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
          <rect x="0" y="4" width="3" height="8" rx="1"/>
          <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" opacity=".6"/>
          <rect x="9" y="0" width="3" height="12" rx="1" opacity=".35"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="1.5" width="21" height="9" rx="2.5" stroke="currentColor" stroke-width="1.2"/>
          <rect id="battery-fill" x="2" y="3" width="15" height="6" rx="1.5" fill="currentColor"/>
          <path d="M23 4.5v3a1.5 1.5 0 0 0 0-3z" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- ─── SIDRUBRIK ─── -->
    <div class="sidrubrik">
      <div class="sidrubrik-titel">Streaks</div>
    </div>

    <!-- ─── RULLNINGSBART INNEHÅLL ─── -->
    <div class="innehall">

      <!-- Aktuell streak + längsta streak -->
      <div class="streak-kort-rad">
        <div class="streak-kort">
          <div class="streak-ikon">🔥</div>
          <div class="streak-siffra">7</div>
          <div class="streak-etikett">Aktuell streak</div>
        </div>
        <div class="streak-kort">
          <div class="streak-ikon">🏆</div>
          <div class="streak-siffra">14</div>
          <div class="streak-etikett">Längsta streak</div>
        </div>
      </div>

      <!-- Veckokalender -->
      <div class="sektionsrubrik">Denna vecka</div>

      <div class="vecko-kalender">
        <div class="kalender-dagar">

          <!-- Måndag: klar -->
          <div class="kalender-dag">
            <div class="dag-namn">Mån</div>
            <div class="dag-siffra klar">6</div>
            <div class="dag-check klar">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
            </div>
          </div>

          <!-- Tisdag: klar -->
          <div class="kalender-dag">
            <div class="dag-namn">Tis</div>
            <div class="dag-siffra klar">7</div>
            <div class="dag-check klar">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
            </div>
          </div>

          <!-- Onsdag: idag -->
          <div class="kalender-dag">
            <div class="dag-namn">Ons</div>
            <div class="dag-siffra idag">8</div>
            <div class="dag-check idag">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
          </div>

          <!-- Torsdag: kommande -->
          <div class="kalender-dag">
            <div class="dag-namn">Tor</div>
            <div class="dag-siffra kommande">9</div>
            <div class="dag-check tom">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
          </div>

          <!-- Fredag: kommande -->
          <div class="kalender-dag">
            <div class="dag-namn">Fre</div>
            <div class="dag-siffra kommande">10</div>
            <div class="dag-check tom">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
          </div>

          <!-- Lördag: kommande -->
          <div class="kalender-dag">
            <div class="dag-namn">Lör</div>
            <div class="dag-siffra kommande">11</div>
            <div class="dag-check tom">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
          </div>

          <!-- Söndag: kommande -->
          <div class="kalender-dag">
            <div class="dag-namn">Sön</div>
            <div class="dag-siffra kommande">12</div>
            <div class="dag-check tom">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
          </div>

        </div>
      </div>

      <!-- Milstolpar -->
      <div class="sektionsrubrik">Milstolpar</div>

      <div class="milstolpar-lista">

        <!-- Uppnådda milstolpar -->
        <div class="milstolpe">
          <div class="milstolpe-check nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
          </div>
          <div class="milstolpe-text aktiv">3 dagar i rad</div>
          <div class="uppnadd-tagg">Uppnådd!</div>
        </div>

        <div class="milstolpe">
          <div class="milstolpe-check nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
          </div>
          <div class="milstolpe-text aktiv">7 dagar i rad</div>
          <div class="uppnadd-tagg">Uppnådd!</div>
        </div>

        <div class="milstolpe">
          <div class="milstolpe-check nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
          </div>
          <div class="milstolpe-text aktiv">14 dagar i rad</div>
          <div class="uppnadd-tagg">Uppnådd!</div>
        </div>

        <!-- Ej uppnådda milstolpar -->
        <div class="milstolpe ej-nadd">
          <div class="milstolpe-check ej-nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <div class="milstolpe-text inaktiv">30 dagar i rad</div>
        </div>

        <div class="milstolpe ej-nadd">
          <div class="milstolpe-check ej-nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <div class="milstolpe-text inaktiv">60 dagar i rad</div>
        </div>

        <div class="milstolpe ej-nadd">
          <div class="milstolpe-check ej-nadd">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <div class="milstolpe-text inaktiv">100 dagar i rad</div>
        </div>

      </div>

      <div class="botten-mellanrum"></div>
    </div>

    <!-- ─── NAVBAR — AKTIVITET/STREAKS ÄR AKTIV ─── -->
    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp aktiv-ram">
        <div class="badge">5</div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="../javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
