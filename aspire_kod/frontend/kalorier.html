<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Kalorilogg</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <!-- ─── STATUSRAD ─── -->
    <div class="statusrad">
      <span class="statusrad-tid">9:41</span>
      <div class="statusrad-ikoner">
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="1.5" width="21" height="9" rx="2.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="2" y="3" width="15" height="6" rx="1.5" fill="currentColor"/>
          <path d="M23 4.5v3a1.5 1.5 0 0 0 0-3z" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- ─── SIDRUBRIK ─── -->
    <div class="sidrubrik">
      <div>
        <div class="sidrubrik-titel">Kalorilogg</div>
        <div style="font-size:13px; color:#ADADAD; margin-top:2px;">
          Fotografera din mat och logga kalorier
        </div>
      </div>
    </div>

    <!-- ─── RULLNINGSBART INNEHÅLL ─── -->
    <div class="innehall">

      <!-- Dagens intag med cirkeldiagram -->
      <div class="kalori-dag-kort">
        <div>
          <div class="kalori-etikett">Dagens intag</div>
          <div class="kalori-siffra">850</div>
          <div class="kalori-enhet">kcal</div>
        </div>
        <div class="kalori-ring">
          <svg viewBox="0 0 56 56">
            <!-- Grå bakgrundscirkel -->
            <circle cx="28" cy="28" r="22" fill="none" stroke="#F0F0F0" stroke-width="4"/>
            <!-- Röd progress (28% av totalt) -->
            <circle cx="28" cy="28" r="22" fill="none" stroke="#E8241C" stroke-width="4"
              stroke-dasharray="138" stroke-dashoffset="99" stroke-linecap="round"/>
          </svg>
          <div class="kalori-ring-procent">28%</div>
        </div>
      </div>

      <!-- Loggformulär -->
      <div class="kalori-formular">

        <div class="kalori-formular-titel">Måltidstyp</div>

        <!-- Välj måltidstyp -->
        <div class="maltids-flikar">
          <button class="maltids-flik inaktiv" onclick="byttMaltid(this)">Frukost</button>
          <button class="maltids-flik aktiv"   onclick="byttMaltid(this)">Lunch</button>
          <button class="maltids-flik inaktiv" onclick="byttMaltid(this)">Middag</button>
          <button class="maltids-flik inaktiv" onclick="byttMaltid(this)">Mellanmål</button>
        </div>

        <!-- Kaloriangivelse -->
        <div class="kalori-falt-etikett">Kalorier</div>
        <input
          id="kalori-input"
          class="kalori-inmatning"
          type="number"
          placeholder="Ange kalorier…"
        >

        <!-- Knappar -->
        <div class="kalori-knappar">
          <button class="avbryt-knapp">Avbryt</button>
          <button class="spara-knapp" onclick="sparaKalorier()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Spara
          </button>
        </div>

      </div>

      <!-- Lista med redan loggade måltider -->
      <div class="sektionsrubrik">Dagens måltider</div>

      <div id="maltider-lista" class="maltider-lista">

        <div class="maltid-post">
          <div class="maltid-bild">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <div class="maltid-info">
            <div class="maltid-namn">Frukost</div>
            <div class="maltid-tid">19:51</div>
          </div>
          <div class="maltid-kcal">650 kcal</div>
        </div>

        <div class="maltid-post">
          <div class="maltid-bild">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <div class="maltid-info">
            <div class="maltid-namn">Mellanmål</div>
            <div class="maltid-tid">19:51</div>
          </div>
          <div class="maltid-kcal">200 kcal</div>
        </div>

      </div>

      <div class="botten-mellanrum"></div>
    </div>

    <!-- ─── NAVBAR — + ÄR AKTIV ─── -->
    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <!-- Plus-knappen är mörkt grå när denna sida är aktiv -->
      <a href="kalorier.html" class="nav-plus" style="background:#333;">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge">5</div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
