<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aspire – Min profil</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <!-- ─── STATUSRAD ─── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner">
      </div>
    </div>

    <!-- ─── SIDRUBRIK + KUGGHJUL ─── -->
    <div class="sidrubrik">
      <div class="sidrubrik-titel">Min profil</div>
      <button class="rund-knapp" onclick="loggarUt()" title="Logga ut">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <!-- ─── RULLNINGSBART INNEHÅLL ─── -->
    <div class="innehall">

      <!-- Användarinfo -->
      <div class="anvandarrad">
        <div class="avatar-fyrkant">DU</div>
        <div>
          <div class="anvandarnamn">Aspire Användare</div>
          <div class="medsedan">Medlem sedan mars 2026</div>
        </div>
      </div>

      <!-- 3 statistikkort: Streak / Utmaningar / Genomfört -->
      <div class="statistik-rad">
        <div class="statistik-kort">
          <div class="statistik-ikon">🔥</div>
          <div class="statistik-siffra">0</div>
          <div class="statistik-etikett">Dagars streak</div>
        </div>
        <div class="statistik-kort">
          <div class="statistik-ikon">🏆</div>
          <div class="statistik-siffra">3</div>
          <div class="statistik-etikett">Utmaningar</div>
        </div>
        <div class="statistik-kort">
          <div class="statistik-ikon">🎯</div>
          <div class="statistik-siffra">0%</div>
          <div class="statistik-etikett">Genomfört</div>
        </div>
      </div>

      <!-- Aktiv utmaning -->
      <div class="sektionsrubrik">Aktiv utmaning</div>

      <div class="kort">
        <div style="font-size:15px; font-weight:700; color:#0A0A0A; margin-bottom:2px;">
          Michael Jordan's schema
        </div>
        <div style="font-size:13px; color:#ADADAD; margin-bottom:14px;">
          Dag 0 av 30
        </div>
        <div class="progress-rad">
          <div class="progress-spar">
            <div class="progress-fyll" style="width: 23%;"></div>
          </div>
          <div class="progress-ring">23%</div>
        </div>
      </div>

      <!-- Veckans sammanfattning -->
      <div class="sektionsrubrik" style="margin-top: 8px;">Veckans sammanfattning</div>

      <div class="vecko-rader">

        <div class="vecko-rad">
          <div class="vecko-ikon">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="vecko-text">Träningspass genomförda</div>
          <div class="vecko-varde">5/6</div>
        </div>

        <div class="vecko-rad">
          <div class="vecko-ikon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          </div>
          <div class="vecko-text">Kalorimål uppnått</div>
          <div class="vecko-varde">4/7</div>
        </div>

        <div class="vecko-rad">
          <div class="vecko-ikon">
            <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div class="vecko-text">Förbättring</div>
          <div class="vecko-varde gron">+12%</div>
        </div>

      </div>

      <!-- Historik-länk -->
      <a href="#" class="historik-lank">
        <span>Historik</span>
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </a>

      <div class="botten-mellanrum"></div>
    </div>

    <!-- ─── NAVBAR — PROFIL ÄR AKTIV ─── -->
    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge">5</div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp aktiv">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="../javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
