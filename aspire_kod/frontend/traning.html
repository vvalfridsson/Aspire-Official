<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Träningsdagbok</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner"></div>
    </div>

    <div class="sidrubrik">
      <div class="sidrubrik-titel">Träningsdagbok</div>
    </div>

    <div class="innehall">

      <div class="sektionsrubrik">Nytt pass</div>
      <div class="traning-formular">
        <input id="pass-namn" class="traning-input" type="text" placeholder="Namn på passet, t.ex. Bröst & Triceps">
        <button class="spara-knapp" onclick="skapaPass()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Skapa pass
        </button>
      </div>

      <div id="ovning-sektion" class="traning-ovning-sektion">
        <div class="sektionsrubrik" id="aktivt-pass-rubrik">Logga övning</div>
        <div class="traning-formular">
          <input id="ovning-namn" class="traning-input" type="text" placeholder="Övning, t.ex. Bänkpress">
          <div class="traning-rad">
            <div class="traning-falt">
              <div class="traning-etikett">Set</div>
              <input id="ovning-set" class="traning-input-liten" type="number" placeholder="3">
            </div>
            <div class="traning-falt">
              <div class="traning-etikett">Reps</div>
              <input id="ovning-reps" class="traning-input-liten" type="number" placeholder="10">
            </div>
            <div class="traning-falt">
              <div class="traning-etikett">Vikt (kg)</div>
              <input id="ovning-vikt" class="traning-input-liten" type="number" placeholder="60">
            </div>
            <div class="traning-falt">
              <div class="traning-etikett">Vila (sek)</div>
              <input id="ovning-vila" class="traning-input-liten" type="number" placeholder="90">
            </div>
          </div>
          <button class="spara-knapp" id="logga-ovning-knapp" onclick="loggaOvning()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Lägg till övning
          </button>
        </div>
        <div id="ovningar-lista" class="ovningar-lista"></div>
      </div>

      <div class="sektionsrubrik" style="margin-top:8px;">Historik</div>
      <div id="historik-lista" class="traning-historik"></div>

      <div class="botten-mellanrum"></div>
    </div>

    <nav class="navbar">
      <a href="hem.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Hem</span>
      </a>
      <a href="sok.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </a>
      <a href="kalorier.html" class="nav-plus">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="streaks.html" class="nav-knapp">
        <div class="badge" id="notis-badge"></div>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Aktivitet</span>
      </a>
      <a href="profil.html" class="nav-knapp">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>

  </div>

<script src="javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
