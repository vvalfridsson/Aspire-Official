<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <title>Aspire — Registrera dig</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="telefon">
    <div class="login-sida">
      <div class="login-bakgrund"></div>
      <div class="login-innehall">
        <div class="login-logotyp">Aspire</div>
        <div class="login-formular">
          <div class="login-titel">Skapa konto</div>
          <div class="login-undertext">Kom igång idag</div>
          <div class="integritet-lank-rad">
          <a href="integritet.html" target="_blank" class="integritet-lank-registrera">Läs vår integritetspolicy</a>
          </div>
          <div id="reg-lyckad" class="reg-lyckad"></div>
          <div id="reg-fel" class="faltfel reg-fel"></div>
          <label class="faltetikett">Namn</label>
          <input id="reg-namn" class="textfalt" type="text" placeholder="Ditt namn">
          <div id="fel-reg-namn" class="faltfel reg-fel"></div>
          <label class="faltetikett">E-postadress</label>
          <input id="reg-epost" class="textfalt" type="email" placeholder="din@epost.se">
          <div id="fel-reg-epost" class="faltfel reg-fel"></div>
          <label class="faltetikett">Lösenord (minst 8 tecken)</label>
          <input id="reg-losenord" class="textfalt" type="password" placeholder="Minst 8 tecken">
          <div id="fel-reg-losenord" class="faltfel reg-fel"></div>
          <label class="faltetikett">Bekräfta lösenord</label>
          <input id="reg-bekrafta" class="textfalt" type="password" placeholder="Upprepa lösenordet">
          <div id="fel-reg-bekrafta" class="faltfel reg-fel"></div>
          <div class="gdpr-rad">
            <input type="checkbox" id="gdpr-samtycke" class="gdpr-kryssruta">
            <label for="gdpr-samtycke" class="gdpr-etikett">
              Jag har läst och godkänner
              <a href="integritet.html" target="_blank" class="gdpr-lank">integritetspolicyn</a>
              och samtycker till att Aspire behandlar mina personuppgifter.
            </label>
          </div>
          <div id="fel-gdpr" class="faltfel">
            Du måste godkänna integritetspolicyn för att fortsätta.
          </div>
          <button class="logga-in-knapp" id="registrera-knapp" type="button">Skapa konto</button>
          <div class="registrera-rad">
            <p>Har du redan ett konto?</p>
            <a href="index.html">Logga in</a>
          </div>
        </div>
      </div>
    </div>
  </div>
<script src="javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
