<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA: gör att appen fungerar som en app på iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aspire">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230A0A0A'/><text x='90' y='122' font-family='Georgia' font-style='italic' font-weight='900' font-size='90' fill='white' text-anchor='middle'>A</text></svg>">

  <title>Aspire — Logga in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="telefon">

    <!-- ─── LOGIN-SIDAN ─── -->
    <div class="login-sida">

      <!-- Mörk bakgrundsöverlagring -->
      <div class="login-bakgrund"></div>

      <!-- Allt innehåll ovanpå bakgrunden -->
      <div class="login-innehall">

        <!-- Logotyp -->
        <div class="login-logotyp">Aspire</div>

        <!-- Formulär längst ner -->
        <form class="login-formular" onsubmit="event.preventDefault(); hanteraInloggning();">

          <div class="login-titel">Logga in</div>
          <div class="login-undertext">Välkommen tillbaka</div>

          <label class="faltetikett">E-postadress</label>
          <input id="inlogg-epost" class="textfalt" type="email" placeholder="din@epost.se">
          <div id="fel-epost" style="font-size:12px;color:#E8241C;
          margin-top:-8px;margin-bottom:10px;display:none;">
          </div>

          <label class="faltetikett">Lösenord</label>
          <input id="inlogg-losenord" class="textfalt" type="password" placeholder="••••••••" autocomplete="current-password">
          <div id="fel-losenord" style="font-size:12px;color:#E8241C;margin-top:-8px;margin-bottom:10px;display:none;"></div>
          <div class="glomt-losenord">Glömt lösenord?</div>

          <!-- Knapp navigerar till hem.html -->
          <button class="logga-in-knapp" onclick="hanteraInloggning()">Logga in</button>
          <div id="inlogg-fel" style="font-size:13px;color:#E8241C; margin-top:8px;display:none;">
          </div>

          <div class="registrera-rad">
            <p>Har du inget konto?</p>
            <a href="registrera.html">Registrera dig</a>
          </div>

        </div>
      </div>
    </div>

  </div>

<script src="../javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
</body>
</html>
