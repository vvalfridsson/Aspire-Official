<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aspire – Inställningar</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/styles.css">
  
</head>
<body>
 
  <div class="telefon">
 
    <!-- ── STATUSRAD ── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner"></div>
    </div>
 
    <!-- ── SIDRUBRIK ── -->
    <div class="sidrubrik">
      <a href="profil.html" class="tillbaka-knapp" title="Tillbaka">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="inst-rubrik">Inställningar</div>
    </div>
 
    <!-- ── RULLNINGSBART INNEHÅLL ── -->
    <div class="innehall">
 
      <!-- PROFILAVATAR -->
      <div class="avatar-sektion">
        <div class="stor-avatar" id="stor-avatar">??</div>
        <div class="avatar-namn" id="vis-namn">Laddar...</div>
        <div class="avatar-epost" id="vis-epost"></div>
      </div>
 
      <!-- SEKTION: KONTOINFORMATION -->
      <div class="sektionsrubrik">Kontoinformation</div>
 
      <div class="inst-kort">
 
        <!-- Namn -->
        <div class="inst-rad">
          <div class="inst-rad-ikon ikon-svart">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="inst-rad-text">
            <div class="inst-rad-etikett">Namn</div>
            <div class="inst-rad-varde" id="vis-namn-rad">—</div>
          </div>
          <button class="inst-radknapp" title="Ändra namn">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
 
        <!-- E-post -->
        <div class="inst-rad">
          <div class="inst-rad-ikon ikon-bla">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div class="inst-rad-text">
            <div class="inst-rad-etikett">E-postadress</div>
            <div class="inst-rad-varde" id="vis-epost-rad">—</div>
          </div>
          <button class="inst-radknapp" title="Ändra e-post">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
 
        <!-- Lösenord -->
        <div class="inst-rad">
          <div class="inst-rad-ikon ikon-lila">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="inst-rad-text">
            <div class="inst-rad-etikett">Lösenord</div>
            <div class="inst-rad-varde">••••••••</div>
          </div>
          <button class="inst-radknapp" title="Ändra lösenord">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
 
      </div>
 
      <!-- SEKTION: KROPPSDATA & BMI -->
      <div class="sektionsrubrik sektionsrubrik--mellanrum">Kroppsdata & BMI</div>
 
      <div class="bmi-visning">
 
        <!-- Inmatning: Längd + Vikt -->
        <div class="bmi-rader">
          <div class="bmi-inmatning">
            <label for="langd-input">Längd</label>
            <input type="number" id="langd-input" placeholder="175" min="50" max="250"
                    inputmode="numeric">
            <span class="enhet">cm</span>
          </div>
          <div class="bmi-inmatning">
            <label for="vikt-input">Vikt</label>
            <input type="number" id="vikt-input" placeholder="70" min="20" max="300"
                    inputmode="decimal" step="0.1">
            <span class="enhet">kg</span>
          </div>
        </div>
 
        <!-- BMI-resultat -->
        <div class="bmi-resultat" id="bmi-resultat">
          <div>
            <div class="bmi-siffra" id="bmi-siffra">—</div>
            <div class="bmi-kategori" id="bmi-kategori">Fyll i längd & vikt</div>
          </div>
          <div class="bmi-skala">
            <div class="bmi-bar-wrap">
              <div class="bmi-pil bmi-pil--dold" id="bmi-pil"></div>
            </div>
            <div class="bmi-bar-etiketter">
              <span>Undervikt</span>
              <span>Normal</span>
              <span>Övervikt</span>
            </div>
          </div>
        </div>
 
        <button class="spara-bmi-knapp" id="spara-bmi-knapp" disabled>
          Spara kroppsdata
        </button>
 
      </div>
 
      <!-- LOGGA UT -->
      <div class="sektionsrubrik sektionsrubrik--mellanrum">Konto</div>
      <button class="logga-ut-knapp">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logga ut
      </button>

      <button class="radera-konto-knapp">
        <svg viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Radera konto
      </button>
 
      <div class="botten-mellanrum botten-mellanrum--liten"></div>
 
    </div><!-- /innehall -->
 
    <!-- ── TOAST ── -->
    <div class="toast" id="toast"></div>
 
    <!-- ── MODAL: Redigera fält ── -->
    <div class="modal-overlay" id="modal-overlay" onclick="stangModal(event)">
      <div class="modal-kort">
        <div class="modal-handtag"></div>
        <div class="modal-titel" id="modal-titel">Ändra</div>
 
        <div id="modal-innehall">
          <!-- Fylls dynamiskt av JS -->
        </div>
 
        <div class="modal-knappar">
          <button class="modal-avbryt">Avbryt</button>
          <button class="modal-spara" id="modal-spara-knapp">Spara</button>
        </div>
 
        <div class="modal-fel" id="modal-fel"></div>
      </div>
    </div>
 
  </div><!-- /telefon -->
 
<script src="javascript/app.js"></script>
<script src="javascript/statusbar.js"></script>
<script src="javascript/installningar.js"></script>

</body>
</html>
