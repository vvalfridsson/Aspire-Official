<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aspire – Inställningar</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/styles.css">
  <style>
 
    /* ── INSTÄLLNINGAR-SPECIFIK CSS ── */
 
    .inst-rubrik {
      font-size: 22px;
      font-weight: 800;
      color: #0A0A0A;
      flex: 1;
      padding-left: 50px;
      padding-top: 10px;
    }
 
    .tillbaka-knapp {
      width: 36px;
      height: 36px;
      background: #F0F0F0;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
 
    .tillbaka-knapp svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #2A2A2A;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    /* ── PROFILAVATAR (stor) ── */
    .stor-avatar {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #0A0A0A 0%, #3A3A3A 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      margin: 0 auto 6px auto;
    }
 
    .avatar-namn {
      font-size: 16px;
      font-weight: 700;
      color: #0A0A0A;
      text-align: center;
    }
 
    .avatar-epost {
      font-size: 12px;
      font-weight: 400;
      color: #ADADAD;
      text-align: center;
      margin-top: 2px;
    }
 
    .avatar-sektion {
      padding: 4px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    /* ── INMATNINGSKORT ── */
    .inst-kort {
      background: #F7F7F7;
      border-radius: 16px;
      margin: 0 20px 12px;
      overflow: hidden;
    }
 
    .inst-rad {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
      position: relative;
    }
 
    .inst-rad + .inst-rad {
      border-top: 1px solid #EBEBEB;
    }
 
    .inst-rad-ikon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .inst-rad-ikon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .ikon-svart { background: #0A0A0A; }
    .ikon-bla   { background: #3B82F6; }
    .ikon-lila  { background: #8B5CF6; }
    .ikon-gron  { background: #22C55E; }
    .ikon-orange{ background: #F97316; }
    .ikon-rod   { background: #EF4444; }
 
    .inst-rad-text {
      flex: 1;
      min-width: 0;
    }
 
    .inst-rad-etikett {
      font-size: 11px;
      font-weight: 600;
      color: #ADADAD;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
 
    .inst-rad-varde {
      font-size: 15px;
      font-weight: 600;
      color: #0A0A0A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .inst-rad-varde.platshallare {
      color: #ADADAD;
      font-weight: 400;
    }
 
    .inst-radknapp {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      color: #ADADAD;
      transition: background 0.15s;
    }
 
    .inst-radknapp:hover {
      background: #EBEBEB;
    }
 
    .inst-radknapp svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    /* ── BMI-KORT ── */
    .bmi-visning {
      background: #F7F7F7;
      border-radius: 16px;
      margin: 0 20px 12px;
      padding: 18px 16px 16px;
    }
 
    .bmi-rader {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
 
    .bmi-inmatning {
      flex: 1;
      background: white;
      border: 1.5px solid #E5E5E5;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
 
    .bmi-inmatning:focus-within {
      border-color: #0A0A0A;
    }
 
    .bmi-inmatning label {
      font-size: 10px;
      font-weight: 700;
      color: #ADADAD;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .bmi-inmatning input {
      border: none;
      outline: none;
      background: none;
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #0A0A0A;
      width: 100%;
    }
 
    .bmi-inmatning .enhet {
      font-size: 12px;
      font-weight: 500;
      color: #ADADAD;
    }
 
    .bmi-resultat {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
 
    .bmi-siffra {
      font-size: 34px;
      font-weight: 800;
      color: #0A0A0A;
      line-height: 1;
    }
 
    .bmi-kategori {
      font-size: 13px;
      font-weight: 600;
      margin-top: 3px;
    }
 
    .bmi-skala {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
 
    .bmi-bar-wrap {
      width: 110px;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #3B82F6 0%, #22C55E 30%, #F59E0B 65%, #EF4444 100%);
      position: relative;
    }
 
    .bmi-pil {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 16px;
      background: white;
      border: 2.5px solid #0A0A0A;
      border-radius: 50%;
      transform: translateX(-50%);
      transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
 
    .bmi-bar-etiketter {
      display: flex;
      justify-content: space-between;
      width: 110px;
    }
 
    .bmi-bar-etiketter span {
      font-size: 9px;
      font-weight: 600;
      color: #ADADAD;
    }
 
    .spara-bmi-knapp {
      width: 100%;
      padding: 13px;
      background: #0A0A0A;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }
 
    .spara-bmi-knapp:active {
      opacity: 0.8;
    }
 
    .spara-bmi-knapp:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
 
    /* ── LOGGA UT KNAPP ── */
    .logga-ut-knapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: calc(100% - 40px);
      margin: 4px 20px 0;
      padding: 15px;
      background: #FEF2F2;
      color: #EF4444;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
 
    .logga-ut-knapp:hover {
      background: #FEE2E2;
    }
 
    .logga-ut-knapp svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    /* ── MODAL (redigeringsformulär) ── */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
 
    .modal-overlay.oppen {
      opacity: 1;
      pointer-events: all;
    }
 
    .modal-kort {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      padding: 24px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
 
    .modal-overlay.oppen .modal-kort {
      transform: translateY(0);
    }
 
    .modal-handtag {
      width: 36px;
      height: 4px;
      background: #E5E5E5;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
 
    .modal-titel {
      font-size: 18px;
      font-weight: 800;
      color: #0A0A0A;
      margin-bottom: 16px;
    }
 
    .modal-falt {
      margin-bottom: 12px;
    }
 
    .modal-falt label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #ADADAD;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
 
    .modal-falt input {
      width: 100%;
      background: #F7F7F7;
      border: 1.5px solid transparent;
      border-radius: 12px;
      padding: 13px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #0A0A0A;
      outline: none;
      transition: border-color 0.2s;
    }
 
    .modal-falt input:focus {
      border-color: #0A0A0A;
      background: white;
    }
 
    .modal-knappar {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
 
    .modal-avbryt {
      flex: 1;
      padding: 14px;
      background: #F0F0F0;
      color: #0A0A0A;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
 
    .modal-spara {
      flex: 2;
      padding: 14px;
      background: #0A0A0A;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
 
    .modal-spara:disabled {
      opacity: 0.4;
    }
 
    .modal-fel {
      font-size: 12px;
      color: #EF4444;
      font-weight: 600;
      margin-top: 8px;
      display: none;
    }
 
    /* ── TOAST NOTIS ── */
    .toast {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #0A0A0A;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 200;
    }
 
    .toast.synlig {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
 
    .laddnings-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: snurra 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
 
    @keyframes snurra {
      to { transform: rotate(360deg); }
    }
 
    .ingen-navbar .botten-mellanrum {
      height: 28px;
    }
 
  </style>
</head>
<body>
 
  <div class="telefon">
 
    <!-- ── STATUSRAD ── -->
    <div class="statusrad">
      <span class="statusrad-tid"></span>
      <div class="statusrad-ikoner"></div>
    </div>
 
    <!-- ── SIDRUBRIK ── -->
    <div class="sidrubrik">
      <a href="profil.html" class="tillbaka-knapp" title="Tillbaka">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="inst-rubrik">Inställningar</div>
    </div>
 
    <!-- ── RULLNINGSBART INNEHÅLL ── -->
    <div class="innehall">
 
      <!-- PROFILAVATAR -->
      <div class="avatar-sektion">
        <div class="stor-avatar" id="stor-avatar">??</div>
        <div class="avatar-namn" id="vis-namn">Laddar...</div>
        <div class="avatar-epost" id="vis-epost"></div>
      </div>
 
      <!-- SEKTION: KONTOINFORMATION -->
      <div class="sektionsrubrik">Kontoinformation</div>
 
      <div class="inst-kort">
 
        <!-- Namn -->
        <div class="inst-rad">
          <div class="inst-rad-ikon ikon-svart">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

          <button class="inst-radknapp" onclick="oppnaModal('namn')" title="Ändra namn">

          <button class="inst-radknapp" onclick="oppnaModal('epost')" title="Ändra e-post">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
 
        <!-- Lösenord -->
        <div class="inst-rad">
          <div class="inst-rad-ikon ikon-lila">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="inst-rad-text">
            <div class="inst-rad-etikett">Lösenord</div>
            <div class="inst-rad-varde">••••••••</div>
          </div>
          <button class="inst-radknapp" onclick="oppnaModal('losenord')" title="Ändra lösenord">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>

      </div>
 
      <!-- SEKTION: KROPPSDATA & BMI -->
      <div class="sektionsrubrik" style="margin-top:8px;">Kroppsdata & BMI</div>

        <!-- Inmatning: Längd + Vikt -->

          <!-- Fylls dynamiskt av JS -->

        <div class="modal-knappar">
          <button class="modal-avbryt" onclick="stangModal(null)">Avbryt</button>
          <button class="modal-spara" id="modal-spara-knapp" onclick="sparaModal()">Spara</button>

  </div><!-- /telefon -->

<script>
 
/* ═══════════════════════════════════════════════════════
   INSTÄLLNINGAR — JAVASCRIPT
═══════════════════════════════════════════════════════ */
 
let aktivtFalt = null;
 
/* ── LADDA ANVÄNDARINFO VID SIDLADDNING ── */
window.addEventListener('DOMContentLoaded', async () => {
  const user = JSON.parse(localStorage.getItem('aspire_inloggad'));
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
 
  // Fyll i avatar och basinfo direkt från localStorage
  fyllInInfo(user);
 
  // Hämta och fyll med data från backend (inkl. kroppsdata)
  try {
    const [anvRes, kroppRes] = await Promise.allSettled([
      fetch(`${ASPIRE_API_BASE_URL}/anvandare/${user.id}`),
      fetch(`${ASPIRE_API_BASE_URL}/anvandare/${user.id}/kropp`)
    ]);
 
    if (anvRes.status === 'fulfilled' && anvRes.value.ok) {
      const anv = await anvRes.value.json();
      // Uppdatera localStorage med senaste data
      const uppdaterad = { ...user, namn: anv.namn, epost: anv.epost };
      localStorage.setItem('aspire_inloggad', JSON.stringify(uppdaterad));
      fyllInInfo(anv);
    }
 
    if (kroppRes.status === 'fulfilled' && kroppRes.value.ok) {
      const kropp = await kroppRes.value.json();
      if (kropp.langd) document.getElementById('langd-input').value = kropp.langd;
      if (kropp.vikt)  document.getElementById('vikt-input').value  = kropp.vikt;
      if (kropp.langd && kropp.vikt) raknaUtBmi();
    }
  } catch (e) {
    console.warn('Kunde inte hämta data från backend:', e);
  }
});
 
function fyllInInfo(data) {
  const namn = data.namn || '';
  const epost = data.epost || '';
 
  document.getElementById('stor-avatar').textContent = namn.substring(0, 2).toUpperCase() || '??';
  document.getElementById('vis-namn').textContent = namn;
  document.getElementById('vis-epost').textContent = epost;
  document.getElementById('vis-namn-rad').textContent = namn || '—';
  document.getElementById('vis-epost-rad').textContent = epost || '—';
}
 
/* ── BMI RÄKNARE ── */
function raknaUtBmi() {
  const langd  = parseFloat(document.getElementById('langd-input').value);
  const vikt   = parseFloat(document.getElementById('vikt-input').value);
  const knapp  = document.getElementById('spara-bmi-knapp');
 
  if (!langd || !vikt || langd < 50 || langd > 250 || vikt < 20 || vikt > 300) {
    document.getElementById('bmi-siffra').textContent   = '—';
    document.getElementById('bmi-kategori').textContent = 'Fyll i längd & vikt';
    document.getElementById('bmi-kategori').style.color = '#ADADAD';
    document.getElementById('bmi-pil').style.opacity   = '0';
    knapp.disabled = true;
    return;
  }
 
  const bmi = vikt / ((langd / 100) ** 2);
  const avrundad = bmi.toFixed(1);
 
  document.getElementById('bmi-siffra').textContent = avrundad;
 
  // Kategori och färg
  let kategori, farg, pilPos;
  if (bmi < 18.5) {
    kategori = '🔵 Undervikt';
    farg     = '#3B82F6';
    pilPos   = Math.max(2, ((bmi - 10) / 8.5) * 28);
  } else if (bmi < 25) {
    kategori = '🟢 Normalvikt';
    farg     = '#22C55E';
    pilPos   = 28 + ((bmi - 18.5) / 6.5) * 35;
  } else if (bmi < 30) {
    kategori = '🟡 Övervikt';
    farg     = '#F59E0B';
    pilPos   = 63 + ((bmi - 25) / 5) * 22;
  } else {
    kategori = '🔴 Fetma';
    farg     = '#EF4444';
    pilPos   = Math.min(96, 85 + ((bmi - 30) / 10) * 11);
  }
 
  document.getElementById('bmi-kategori').textContent = kategori;
  document.getElementById('bmi-kategori').style.color  = farg;
 
  const pil = document.getElementById('bmi-pil');
  pil.style.left    = `${pilPos}%`;
  pil.style.opacity = '1';
  pil.style.borderColor = farg;
 
  knapp.disabled = false;
}
 
/* ── SPARA KROPPSDATA TILL BACKEND ── */
async function sparaKroppsdata() {
  const user   = JSON.parse(localStorage.getItem('aspire_inloggad'));
  if (!user) return;
 
  const langd = parseFloat(document.getElementById('langd-input').value);
  const vikt  = parseFloat(document.getElementById('vikt-input').value);
  const knapp = document.getElementById('spara-bmi-knapp');
 
  knapp.disabled = true;
  knapp.innerHTML = '<span class="laddnings-spinner"></span> Sparar…';
 
  try {
    const svar = await fetch(`${ASPIRE_API_BASE_URL}/anvandare/${user.id}/kropp`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ langd, vikt })
    });
 
    if (!svar.ok) throw new Error('Serverfel');
 
    visaToast('✓ Kroppsdata sparad!');
  } catch {
    visaToast('Kunde inte spara till servern.');
  } finally {
    knapp.disabled = false;
    knapp.textContent = 'Spara kroppsdata';
  }
}
 
/* ══ MODAL ══ */
 
const MODAL_KONFIGURATION = {
  namn: {
    titel: 'Ändra namn',
    falt: [
      { id: 'nytt-namn', etikett: 'Nytt namn', typ: 'text', placeholder: 'Ditt namn', required: true }
    ],
    forVal: () => {
      const v = document.getElementById('vis-namn-rad').textContent;
      return { 'nytt-namn': v === '—' ? '' : v };
    }
  },
  epost: {
    titel: 'Ändra e-postadress',
    falt: [
      { id: 'nytt-epost', etikett: 'Ny e-postadress', typ: 'email', placeholder: 'namn@exempel.se', required: true }
    ],
    forVal: () => {
      const v = document.getElementById('vis-epost-rad').textContent;
      return { 'nytt-epost': v === '—' ? '' : v };
    }
  },
  losenord: {
    titel: 'Ändra lösenord',
    falt: [
      { id: 'nuv-losenord',  etikett: 'Nuvarande lösenord',   typ: 'password', placeholder: '••••••••', required: true },
      { id: 'nytt-losenord', etikett: 'Nytt lösenord (min. 8 tecken)', typ: 'password', placeholder: '••••••••', required: true },
      { id: 'bek-losenord',  etikett: 'Bekräfta nytt lösenord', typ: 'password', placeholder: '••••••••', required: true }
    ],
    forVal: () => ({})
  }
};
 
function oppnaModal(falt) {
  aktivtFalt = falt;
  const konf  = MODAL_KONFIGURATION[falt];
  const forval = konf.forVal();
 
  document.getElementById('modal-titel').textContent = konf.titel;
  document.getElementById('modal-fel').style.display = 'none';
 
  const innehall = konf.falt.map(f => `
    <div class="modal-falt">
      <label for="${f.id}">${f.etikett}</label>
      <input id="${f.id}" type="${f.typ}" placeholder="${f.placeholder}"
             value="${forval[f.id] || ''}" autocomplete="off">
    </div>
  `).join('');
 
  document.getElementById('modal-innehall').innerHTML = innehall;
  document.getElementById('modal-spara-knapp').disabled = false;
  document.getElementById('modal-overlay').classList.add('oppen');
 
  // Fokusera första fältet
  setTimeout(() => {
    const forsta = document.querySelector('.modal-falt input');
    if (forsta) forsta.focus();
  }, 300);
}
 
function stangModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('oppen');
  aktivtFalt = null;
}
 
async function sparaModal() {
  if (!aktivtFalt) return;
 
  const user   = JSON.parse(localStorage.getItem('aspire_inloggad'));
  if (!user) return;
 
  const felDiv = document.getElementById('modal-fel');
  const knapp  = document.getElementById('modal-spara-knapp');
  felDiv.style.display = 'none';
  knapp.disabled = true;
  knapp.innerHTML = '<span class="laddnings-spinner"></span> Sparar…';
 
  try {
    let kropp = {};
 
    if (aktivtFalt === 'namn') {
      const nyttNamn = document.getElementById('nytt-namn').value.trim();
      if (!nyttNamn) { visaModalFel('Namn kan inte vara tomt.'); return; }
      kropp = { namn: nyttNamn };
 
    } else if (aktivtFalt === 'epost') {
      const nyttEpost = document.getElementById('nytt-epost').value.trim();
      if (!nyttEpost || !nyttEpost.includes('@')) { visaModalFel('Ange en giltig e-postadress.'); return; }
      kropp = { epost: nyttEpost };
 
    } else if (aktivtFalt === 'losenord') {
      const nuvLos  = document.getElementById('nuv-losenord').value;
      const nyttLos = document.getElementById('nytt-losenord').value;
      const bekLos  = document.getElementById('bek-losenord').value;
 
      if (!nuvLos)             { visaModalFel('Ange ditt nuvarande lösenord.'); return; }
      if (nyttLos.length < 8)  { visaModalFel('Nytt lösenord måste ha minst 8 tecken.'); return; }
      if (nyttLos !== bekLos)  { visaModalFel('Lösenorden matchar inte.'); return; }
 
      kropp = { nuvarande_losenord: nuvLos, nytt_losenord: nyttLos };
    }
 
    const svar = await fetch(`${ASPIRE_API_BASE_URL}/anvandare/${user.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(kropp)
    });
 
    const data = await svar.json();
 
    if (!svar.ok) {
      visaModalFel(data.detail || 'Något gick fel.');
      return;
    }
 
    // Uppdatera localStorage och visningsinfo
    const uppdaterad = { ...user };
    if (kropp.namn)  uppdaterad.namn  = kropp.namn;
    if (kropp.epost) uppdaterad.epost = kropp.epost;
    localStorage.setItem('aspire_inloggad', JSON.stringify(uppdaterad));
 
    fyllInInfo(uppdaterad);
 
    document.getElementById('modal-overlay').classList.remove('oppen');
    visaToast('✓ Ändring sparad!');
 
  } catch {
    visaModalFel('Kunde inte ansluta till servern.');
  } finally {
    knapp.disabled = false;
    knapp.textContent = 'Spara';
  }
}
 
function visaModalFel(meddelande) {
  const felDiv = document.getElementById('modal-fel');
  felDiv.textContent = meddelande;
  felDiv.style.display = 'block';
  const knapp = document.getElementById('modal-spara-knapp');
  knapp.disabled = false;
  knapp.textContent = 'Spara';
}
 
/* ── TOAST ── */
let toastTimeout = null;
function visaToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('synlig');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('synlig'), 2500);
}
 
/* ── LOGGA UT ── */
function loggarUt() {
  if (!confirm('Vill du verkligen logga ut?')) return;
  ['aspire_inloggad', 'anvandare', 'user', 'aspire_alla_atleter'].forEach(k => localStorage.removeItem(k));
  window.location.href = 'index.html';
}

/* ── RADERA KONTO (K-SEC-1.1) ── */
function raderaKonto() {
  if (!confirm('Är du säker på att du vill radera ditt konto? All data tas bort permanent och kan inte återställas.')) return;
  var anvandare = JSON.parse(localStorage.getItem('aspire_inloggad') || 'null');
  if (!anvandare || !anvandare.id) {
    alert('Kunde inte hitta kontoinformation.');
    return;
  }
  fetch('http://127.0.0.1:8002/anvandare/' + anvandare.id, {
    method: 'DELETE'
  })
  .then(function(svar) { return svar.json(); })
  .then(function() {
    ['aspire_inloggad', 'anvandare', 'user', 'aspire_alla_atleter'].forEach(function(k) {
      localStorage.removeItem(k);
    });
    window.location.href = 'index.html';
  })
  .catch(function() {
    alert('Något gick fel. Försök igen.');
  });
}
